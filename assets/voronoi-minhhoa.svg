<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>

  <!-- ============ LEFT: input points ============ -->
  <text x="30" y="34" font-size="15" font-weight="700" fill="#1e293b">Tập điểm đầu vào (P)</text>
  <rect x="30" y="55" width="180" height="170" rx="6" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="35" y="242" font-size="11.5" fill="#64748b">B (Boundary) — tùy chọn</text>

  <g fill="#2563eb">
    <circle cx="70" cy="90" r="5"/>
    <circle cx="150" cy="80" r="5"/>
    <circle cx="185" cy="140" r="5"/>
    <circle cx="60" cy="160" r="5"/>
    <circle cx="120" cy="200" r="5"/>
    <circle cx="175" cy="200" r="5"/>
  </g>

  <line x1="220" y1="140" x2="278" y2="140" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ CENTER: GH component ============ -->
  <rect x="282" y="95" width="180" height="90" rx="10" fill="#1f2937"/>
  <text x="372" y="145" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Voronoi</text>
  <circle cx="282" cy="120" r="6" fill="#f59e0b"/>
  <text x="268" y="115" font-size="12" fill="#1e293b" text-anchor="end">P (Points)</text>
  <circle cx="282" cy="160" r="6" fill="#a855f7"/>
  <text x="268" y="165" font-size="12" fill="#1e293b" text-anchor="end">B (Boundary)</text>
  <circle cx="462" cy="140" r="6" fill="#16a34a"/>

  <line x1="468" y1="140" x2="540" y2="140" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="500" y="128" font-size="12" fill="#166534" text-anchor="middle">C</text>

  <!-- ============ RIGHT: Voronoi cells ============ -->
  <text x="545" y="34" font-size="15" font-weight="700" fill="#1e293b">Kết quả (C — Cells)</text>
  <g stroke="#16a34a" stroke-width="1.8" fill="#f0fdf4">
    <path d="M545,60 L615,55 L640,90 L600,120 L555,105 Z"/>
    <path d="M615,55 L695,65 L690,100 L640,90 Z"/>
    <path d="M600,120 L640,90 L690,100 L680,150 L630,160 Z"/>
    <path d="M555,105 L600,120 L630,160 L580,190 L545,160 Z"/>
    <path d="M545,60 L555,105 L545,160 L520,140 L525,80 Z" fill="#ecfdf5"/>
  </g>
  <g fill="#2563eb">
    <circle cx="595" cy="82" r="4"/>
    <circle cx="655" cy="75" r="4"/>
    <circle cx="655" cy="115" r="4"/>
    <circle cx="565" cy="130" r="4"/>
    <circle cx="605" cy="155" r="4"/>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="380" y="380" font-size="12" fill="#64748b" text-anchor="middle">Voronoi chia mặt phẳng thành các ô — mỗi ô là vùng gần 1 điểm gieo nhất so với các điểm còn lại</text>
</svg>
