<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', Arial, sans-serif">
  <rect width="760" height="420" fill="#ffffff"/>

  <!-- ============ LEFT: input Brep (cube) ============ -->
  <text x="40" y="34" font-size="15" font-weight="700" fill="#1e293b">Brep đầu vào</text>

  <!-- cube wireframe -->
  <g stroke="#334155" stroke-width="2" fill="none">
    <!-- back face -->
    <polygon points="90,110 190,90 190,190 90,210" fill="#eff6ff" stroke="#94a3b8"/>
    <!-- front face (highlighted = 1 Face) -->
    <polygon points="60,150 160,130 160,230 60,250" fill="#bfdbfe" stroke="#2563eb" stroke-width="2.5"/>
    <!-- connecting edges -->
    <line x1="90" y1="110" x2="60" y2="150"/>
    <line x1="190" y1="90" x2="160" y2="130"/>
    <line x1="190" y1="190" x2="160" y2="230"/>
    <line x1="90" y1="210" x2="60" y2="250"/>
  </g>
  <!-- one edge highlighted red = 1 Edge -->
  <line x1="60" y1="150" x2="160" y2="130" stroke="#dc2626" stroke-width="4"/>
  <!-- one vertex highlighted green = 1 Vertex -->
  <circle cx="60" cy="150" r="6" fill="#16a34a"/>

  <text x="35" y="290" font-size="12" fill="#2563eb">■ 1 Face (mặt)</text>
  <text x="35" y="308" font-size="12" fill="#dc2626">━ 1 Edge (cạnh)</text>
  <text x="35" y="326" font-size="12" fill="#16a34a">● 1 Vertex (đỉnh)</text>

  <!-- arrow to component -->
  <line x1="215" y1="180" x2="275" y2="180" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ CENTER: GH component ============ -->
  <g>
    <rect x="280" y="130" width="180" height="100" rx="10" fill="#1f2937"/>
    <text x="370" y="185" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Deconstruct</text>
    <text x="370" y="203" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Brep</text>
    <!-- input dot -->
    <circle cx="280" cy="180" r="6" fill="#f59e0b"/>
    <text x="266" y="150" font-size="12" fill="#1e293b" text-anchor="end">B (Brep)</text>
    <!-- output dots -->
    <circle cx="460" cy="150" r="6" fill="#2563eb"/>
    <circle cx="460" cy="180" r="6" fill="#dc2626"/>
    <circle cx="460" cy="210" r="6" fill="#16a34a"/>
  </g>

  <!-- ============ RIGHT: 3 outputs ============ -->
  <!-- F -->
  <line x1="466" y1="150" x2="540" y2="90" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="60" width="150" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="625" y="84" font-size="13" font-weight="700" fill="#1e40af" text-anchor="middle">F — Faces</text>
  <text x="625" y="102" font-size="11.5" fill="#334155" text-anchor="middle">danh sách các mặt</text>

  <!-- E -->
  <line x1="466" y1="180" x2="540" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="150" width="150" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="625" y="174" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">E — Edges</text>
  <text x="625" y="192" font-size="11.5" fill="#334155" text-anchor="middle">danh sách các cạnh</text>

  <!-- V -->
  <line x1="466" y1="210" x2="540" y2="270" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="240" width="150" height="60" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="625" y="264" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">V — Vertices</text>
  <text x="625" y="282" font-size="11.5" fill="#334155" text-anchor="middle">danh sách các đỉnh</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <text x="380" y="400" font-size="12" fill="#64748b" text-anchor="middle">Deconstruct Brep tháo 1 khối 3D (Brep) thành 3 thành phần cơ bản: Faces · Edges · Vertices</text>
</svg>
