<svg width="1050" height="360" viewBox="0 0 1050 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <linearGradient id="paramGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F200"/>
    <stop offset="100%" stop-color="#A8C400"/>
  </linearGradient>
  <pattern id="dg" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>
<rect x="0" y="0" width="1050" height="360" fill="#FAFAF7"/>
<rect x="0" y="0" width="1050" height="360" fill="url(#dg)"/>

<!-- Point param -->
<rect x="20" y="40" width="110" height="34" rx="5" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="75" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3d00">Point</text>
<rect x="128" y="50" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="133" cy="57" r="2.3" fill="#3a3d00"/>

<!-- Curve param -->
<rect x="20" y="110" width="110" height="34" rx="5" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="75" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3d00">Curve</text>
<rect x="128" y="120" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="133" cy="127" r="2.3" fill="#3a3d00"/>

<!-- wires to Curve Closest Point -->
<path d="M 133,57 C 160,57 160,80 187,80" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<path d="M 133,127 C 160,127 160,104 187,104" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<!-- Curve Closest Point box x=195 y=40 w=155 h=100 (range 40-140) -->
<g>
  <rect x="195" y="40" width="155" height="100" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="272" y="60" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222">Curve Closest</text>
  <text x="272" y="74" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#222">Point</text>
  <rect x="187" y="73" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="192" cy="80" r="2.3" fill="#4A4A4A"/>
  <text x="204" y="84" font-size="10.5" fill="#333">P</text>
  <rect x="187" y="97" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="192" cy="104" r="2.3" fill="#4A4A4A"/>
  <text x="204" y="108" font-size="10.5" fill="#333">C</text>
  <!-- outputs P, t, D stacked at right -->
  <rect x="343" y="55" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="348" cy="62" r="2.3" fill="#4A4A4A"/>
  <text x="333" y="66" text-anchor="end" font-size="10.5" fill="#333">P</text>
  <rect x="343" y="78" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="348" cy="85" r="2.3" fill="#4A4A4A"/>
  <text x="333" y="89" text-anchor="end" font-size="10.5" fill="#333">t</text>
  <rect x="343" y="101" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="348" cy="108" r="2.3" fill="#4A4A4A"/>
  <text x="333" y="112" text-anchor="end" font-size="10.5" fill="#333">D</text>
</g>

<!-- t output feeds Shatter t; Curve param also re-used into Shatter C (dashed passthrough) -->
<path d="M 348,85 C 400,85 400,155 452,155" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<path d="M 133,127 C 380,127 380,131 452,131" stroke="#4A4A4A" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.6"/>

<!-- Shatter box x=460 y=100 w=140 h=90 (range 100-190) -->
<g>
  <rect x="460" y="100" width="140" height="90" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="530" y="124" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Shatter</text>
  <rect x="452" y="124" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="457" cy="131" r="2.3" fill="#4A4A4A"/>
  <text x="470" y="135" font-size="10.5" fill="#333">C</text>
  <rect x="452" y="148" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="457" cy="155" r="2.3" fill="#4A4A4A"/>
  <text x="470" y="159" font-size="10.5" fill="#333">t</text>
  <rect x="588" y="136" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="593" cy="143" r="2.3" fill="#4A4A4A"/>
  <text x="578" y="139" text-anchor="end" font-size="10.5" fill="#333">S</text>
</g>

<path d="M 598,143 C 625,143 625,143 652,143" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<!-- Right viewport -->
<rect x="660" y="30" width="370" height="300" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="670" y="52" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective</text>
<path d="M 700,290 Q 800,220 860,150" stroke="#222222" stroke-width="2.2" fill="none"/>
<path d="M 860,150 Q 920,90 1000,70" stroke="#1f8a8a" stroke-width="2.2" fill="none"/>
<circle cx="860" cy="150" r="4.5" fill="#c0392b"/>
<circle cx="820" cy="185" r="3.5" fill="#c0392b" opacity="0.55"/>
<line x1="820" y1="185" x2="860" y2="150" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
<text x="770" y="200" font-size="9.5" fill="#c0392b">Point gốc</text>

<text x="670" y="300" font-size="10.5" fill="#555">Point được "chiếu" thành parameter t rồi dùng để Shatter cắt Curve</text>

<text x="20" y="330" font-size="12.5" fill="#333">Point, Curve → Curve Closest Point (t) → Shatter (C, t) → 2 đoạn Curve</text>
</svg>
