<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dotgrid2" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="900" height="260" fill="#FAFAF7"/>
<rect x="0" y="0" width="900" height="260" fill="url(#dotgrid2)"/>

<!-- Box 1: Rectangle -->
<g>
  <rect x="30" y="104" width="120" height="48" rx="6" fill="url(#ghBody2)" stroke="#8C8C8C" stroke-width="1"/>
  <text x="90" y="132" text-anchor="middle" font-size="13" fill="#222">Rectangle</text>
  <rect x="146" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="151" cy="128" r="2.5" fill="#4A4A4A"/>
</g>

<!-- wire 1 -->
<path d="M 156,128 C 190,128 190,112 223,112" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 2: Extrude -->
<g>
  <rect x="226" y="92" width="140" height="72" rx="6" fill="url(#ghBody2)" stroke="#8C8C8C" stroke-width="1.3"/>
  <text x="296" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#222">Extrude</text>
  <rect x="218" y="104" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="223" cy="112" r="2.5" fill="#4A4A4A"/>
  <text x="214" y="110" text-anchor="end" font-size="10" fill="#888">B</text>
  <rect x="218" y="140" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="223" cy="148" r="2.5" fill="#4A4A4A"/>
  <text x="214" y="152" text-anchor="end" font-size="10" fill="#888">D</text>
  <rect x="368" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="373" cy="128" r="2.5" fill="#4A4A4A"/>
</g>

<!-- small vector slider feeding Direction -->
<g>
  <rect x="150" y="176" width="100" height="24" rx="4" fill="#FFFFFF" stroke="#8C8C8C" stroke-width="1"/>
  <text x="158" y="192" font-size="10" fill="#333">Unit Z</text>
  <circle cx="200" cy="188" r="3" fill="#6699CC"/>
  <rect x="252" y="180" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="257" cy="188" r="2.5" fill="#4A4A4A"/>
</g>
<path d="M 262,188 C 280,188 280,150 223,150" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<!-- wire 2 -->
<path d="M 378,128 C 405,128 405,128 432,128" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 3: Brep output param -->
<g>
  <rect x="434" y="106" width="100" height="44" rx="6" fill="url(#ghBody2)" stroke="#8C8C8C" stroke-width="1"/>
  <text x="484" y="132" text-anchor="middle" font-size="13" fill="#222">Brep</text>
  <rect x="530" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="535" cy="128" r="2.5" fill="#4A4A4A"/>
</g>

<!-- Bake arrow -->
<path d="M 540,128 C 570,128 570,128 596,128" stroke="#4A4A4A" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>
<g>
  <rect x="598" y="112" width="58" height="32" rx="5" fill="#2E7D32"/>
  <text x="627" y="132" text-anchor="middle" font-size="11" fill="#FFFFFF">Bake</text>
</g>
<path d="M 656,128 C 680,128 680,128 700,128" stroke="#4A4A4A" stroke-width="1.5" fill="none" marker-end="url(#arrow2)"/>
<defs>
  <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#4A4A4A"/>
  </marker>
</defs>

<!-- Mini Rhino viewport result -->
<g>
  <rect x="702" y="40" width="160" height="180" fill="#FFFFFF" stroke="#B0B0B0"/>
  <g stroke="#D8D8D8" stroke-width="1">
    <line x1="702" y1="190" x2="862" y2="190"/>
    <line x1="702" y1="170" x2="862" y2="170"/>
    <line x1="702" y1="155" x2="862" y2="155"/>
  </g>
  <text x="710" y="56" font-family="Consolas, monospace" font-size="10" fill="#555">Perspective</text>
  <polygon points="730,175 830,175 830,120 800,120 800,150 730,150" fill="none" stroke="#111" stroke-width="1.2"/>
  <polygon points="740,110 840,110 840,70 810,70 810,95 740,95" fill="#D8CDBE" opacity="0.9" stroke="#111" stroke-width="1.2"/>
  <line x1="730" y1="175" x2="740" y2="110" stroke="#111" stroke-width="0.8"/>
  <line x1="830" y1="175" x2="840" y2="110" stroke="#111" stroke-width="0.8"/>
  <line x1="830" y1="120" x2="840" y2="70" stroke="#111" stroke-width="0.8"/>
  <line x1="800" y1="120" x2="810" y2="70" stroke="#111" stroke-width="0.8"/>
</g>

<text x="20" y="240" font-size="12" fill="#555">Workflow phổ biến: Rectangle → Extrude (theo Unit Z) → Brep → Bake ra Rhino</text>
</svg>
