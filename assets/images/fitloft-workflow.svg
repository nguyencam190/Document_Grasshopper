<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dotgrid1" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="900" height="260" fill="#FAFAF7"/>
<rect x="0" y="0" width="900" height="260" fill="url(#dotgrid1)"/>

<!-- Box 1: Curves (xN) param -->
<g>
  <rect x="40" y="100" width="130" height="56" rx="6" fill="url(#ghBody1)" stroke="#8C8C8C" stroke-width="1"/>
  <text x="105" y="124" text-anchor="middle" font-size="13" fill="#222">Curves</text>
  <text x="105" y="142" text-anchor="middle" font-size="11" fill="#666">(x N section)</text>
  <rect x="162" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="167" cy="128" r="2.5" fill="#4A4A4A"/>
</g>

<!-- 3 mini curve icons stacked to suggest multiple sections -->
<g stroke="#555" stroke-width="1.3" fill="none">
  <path d="M 55,108 C 70,100 90,100 105,108"/>
  <path d="M 55,116 C 72,106 98,106 118,116" opacity="0.7"/>
  <path d="M 55,124 C 75,112 105,112 128,124" opacity="0.45"/>
</g>

<!-- wire 1 -->
<path d="M 172,128 C 210,128 210,128 248,128" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 2: Fit Loft (main component) -->
<g>
  <rect x="250" y="88" width="150" height="80" rx="6" fill="url(#ghBody1)" stroke="#8C8C8C" stroke-width="1.3"/>
  <text x="325" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#222">Fit Loft</text>
  <rect x="242" y="100" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="247" cy="108" r="2.5" fill="#4A4A4A"/>
  <rect x="242" y="122" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="247" cy="130" r="2.5" fill="#4A4A4A"/>
  <rect x="242" y="144" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="247" cy="152" r="2.5" fill="#4A4A4A"/>
  <rect x="398" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="403" cy="128" r="2.5" fill="#4A4A4A"/>
</g>
<text x="238" y="98" text-anchor="end" font-size="10" fill="#888">Nu/Du/Dv</text>

<!-- wire 2 -->
<path d="M 408,128 C 445,128 445,128 482,128" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 3: Surface output param -->
<g>
  <rect x="484" y="104" width="110" height="48" rx="6" fill="url(#ghBody1)" stroke="#8C8C8C" stroke-width="1"/>
  <text x="539" y="132" text-anchor="middle" font-size="13" fill="#222">Surface</text>
  <rect x="590" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="595" cy="128" r="2.5" fill="#4A4A4A"/>
</g>

<!-- wire to viewport -->
<path d="M 600,128 C 630,128 630,128 660,128" stroke="#4A4A4A" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>

<!-- Mini Rhino viewport result -->
<g>
  <rect x="662" y="40" width="200" height="180" fill="#FFFFFF" stroke="#B0B0B0"/>
  <g stroke="#D8D8D8" stroke-width="1">
    <line x1="662" y1="190" x2="862" y2="190"/>
    <line x1="662" y1="170" x2="862" y2="170"/>
    <line x1="662" y1="155" x2="862" y2="155"/>
  </g>
  <text x="670" y="56" font-family="Consolas, monospace" font-size="10" fill="#555">Perspective</text>
  <path d="M 690,150 C 720,110 800,110 830,150 C 800,175 720,175 690,150 Z" fill="#C2C2B8" stroke="#222" stroke-width="1"/>
  <path d="M 690,150 C 720,130 800,130 830,150" stroke="#666" stroke-width="0.8" fill="none"/>
</g>

<text x="20" y="240" font-size="12" fill="#555">Workflow phổ biến: nhiều đường Curve section → Fit Loft → 1 mặt Surface mượt</text>
</svg>
