<svg width="1100" height="440" viewBox="0 0 1100 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <linearGradient id="paramGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F200"/>
    <stop offset="100%" stop-color="#A8C400"/>
  </linearGradient>
  <pattern id="dg" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>
<rect x="0" y="0" width="640" height="440" fill="#FAFAF7"/>
<rect x="0" y="0" width="640" height="440" fill="url(#dg)"/>

<!-- 9 points source -->
<rect x="20" y="110" width="150" height="60" rx="6" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="95" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3d00">9 điểm</text>
<text x="95" y="152" text-anchor="middle" font-size="10" fill="#3a3d00">(P4'→...→P0→...→P4)</text>
<rect x="168" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="173" cy="140" r="2.3" fill="#3a3d00"/>

<path d="M 173,140 C 205,140 205,140 232,140" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Polyline box -->
<g>
  <rect x="240" y="110" width="120" height="60" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="300" y="145" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Polyline</text>
  <rect x="232" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="237" cy="140" r="2.3" fill="#4A4A4A"/>
  <text x="249" y="127" font-size="10" fill="#333">V</text>
  <rect x="358" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="363" cy="140" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 363,140 C 385,140 385,140 402,140" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Fillet box -->
<g>
  <rect x="410" y="95" width="180" height="90" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="500" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Fillet</text>
  <rect x="402" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="407" cy="140" r="2.3" fill="#4A4A4A"/>
  <text x="419" y="144" font-size="10" fill="#333">C</text>
  <rect x="402" y="157" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="407" cy="164" r="2.3" fill="#4A4A4A"/>
  <text x="419" y="168" font-size="10" fill="#333">R</text>
  <text x="500" y="168" text-anchor="middle" font-size="10.5" fill="#c0392b" font-weight="600">0,0,0,0,0,15,0</text>
  <rect x="588" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="593" cy="140" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 593,140 C 610,140 610,140 620,140" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<text x="20" y="220" font-size="11.5" fill="#333">Thứ tự 7 góc trong Polyline (2 đầu mút P4', P4 không tính):</text>
<text x="20" y="242" font-size="11.5" fill="#333">P3' → P2' → P1' → P0 → P1 → <tspan fill="#c0392b" font-weight="700">P2</tspan> → P3</text>
<text x="20" y="264" font-size="11.5" fill="#333">R tương ứng: 0, 0, 0, 0, 0, <tspan fill="#c0392b" font-weight="700">15</tspan>, 0 — chỉ P2 có số &gt; 0</text>

<text x="20" y="330" font-size="12" fill="#333">Polyline giữ nguyên mọi góc (không tự làm mượt như Kinky Curve)</text>
<text x="20" y="352" font-size="11" fill="#555">→ vị trí góc trong R list luôn cố định, dễ nhắm đúng 1 điểm cụ thể.</text>

<!-- Right viewport -->
<rect x="640" y="0" width="460" height="440" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="650" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Front</text>

<path d="M 835.0,325.0 L 822.0,305.0 L 815.0,245.0 L 870.0,203.0 L 930.0,200.0 L 990.0,203.0 L 1033.9,236.5 Q 1045.0,245.0 1043.4,258.9 L 1038.0,305.0 L 1025.0,325.0" fill="none" stroke="#222222" stroke-width="2.2"/>

<circle cx="815" cy="245" r="3.5" fill="#666"/>
<circle cx="870" cy="203" r="3.5" fill="#666"/>
<circle cx="930" cy="200" r="3.5" fill="#666"/>
<circle cx="990" cy="203" r="3.5" fill="#666"/>
<circle cx="1038" cy="305" r="3.5" fill="#666"/>

<circle cx="1045" cy="245" r="5" fill="#c0392b" stroke="#FFFFFF" stroke-width="1.2"/>
<line x1="1045" y1="245" x2="1030" y2="180" stroke="#c0392b" stroke-width="1"/>
<text x="1028" y="168" text-anchor="end" font-size="12.5" font-weight="700" fill="#c0392b">P2 đã bo</text>

<text x="930" y="188" text-anchor="middle" font-size="10" fill="#999">P0</text>
<text x="870" y="193" text-anchor="middle" font-size="10" fill="#999">P1'</text>
<text x="990" y="193" text-anchor="middle" font-size="10" fill="#999">P1</text>

<text x="650" y="390" font-size="10.5" fill="#222">Các góc khác (P0, P1, P3...) vẫn giữ nguyên nhọn vì R=0</text>
<text x="650" y="408" font-size="10.5" fill="#c0392b">Chỉ P2 được bo tròn — đúng ý muốn kiểm soát riêng từng điểm</text>
</svg>
