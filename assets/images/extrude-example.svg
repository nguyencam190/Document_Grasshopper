<svg width="640" height="380" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="640" height="380" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="0" y1="330" x2="640" y2="330"/>
  <line x1="0" y1="298" x2="640" y2="298"/>
  <line x1="0" y1="268" x2="640" y2="268"/>
</g>
<text x="12" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective</text>

<!-- L-shaped building footprint (base, ground) -->
<polygon points="150,320 380,320 380,260 300,260 300,300 150,300" fill="none" stroke="#111" stroke-width="1.3"/>

<!-- extruded building mass (top face + verticals) -->
<polygon points="170,190 400,190 400,130 320,130 320,170 170,170" fill="#D8CDBE" opacity="0.9" stroke="#111" stroke-width="1.3"/>
<line x1="150" y1="320" x2="170" y2="190" stroke="#111" stroke-width="1"/>
<line x1="380" y1="320" x2="400" y2="190" stroke="#111" stroke-width="1"/>
<line x1="380" y1="260" x2="400" y2="130" stroke="#111" stroke-width="1"/>
<line x1="300" y1="260" x2="320" y2="130" stroke="#111" stroke-width="1"/>
<line x1="300" y1="300" x2="320" y2="170" stroke="#111" stroke-width="1"/>
<line x1="150" y1="300" x2="170" y2="170" stroke="#111" stroke-width="1"/>

<!-- height dimension arrow -->
<line x1="440" y1="320" x2="440" y2="150" stroke="#c0392b" stroke-width="1.4"/>
<line x1="432" y1="320" x2="448" y2="320" stroke="#c0392b" stroke-width="1.4"/>
<line x1="432" y1="150" x2="448" y2="150" stroke="#c0392b" stroke-width="1.4"/>
<text x="452" y="238" font-size="11" fill="#c0392b">Direction = chiều cao tầng</text>

<text x="12" y="358" font-size="12" fill="#555">Mặt bằng tầng (Base) đùn theo phương đứng (Direction) → khối công trình đơn giản</text>
</svg>
