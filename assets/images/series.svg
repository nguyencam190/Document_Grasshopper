<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dotgrid" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="520" height="440" fill="url(#dotgrid)"/>
<rect x="0" y="0" width="520" height="440" fill="#F7F7F2" opacity="0.35"/>

<!-- S=0 slider -->
<rect x="20" y="111" width="150" height="34" rx="5" fill="#F0F0F0" stroke="#8C8C8C"/>
<rect x="28" y="122" width="60" height="10" rx="3" fill="#E4E4E4" stroke="#B0B0B0"/>
<circle cx="34" cy="127" r="5" fill="#8C8C8C"/>
<text x="128" y="132" text-anchor="start" font-size="10" fill="#333">S = 0</text>
<rect x="170" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
<circle cx="175" cy="128" r="2.3" fill="#4A4A4A"/>

<!-- N=1 slider -->
<rect x="20" y="147" width="150" height="34" rx="5" fill="#F0F0F0" stroke="#8C8C8C"/>
<rect x="28" y="158" width="60" height="10" rx="3" fill="#E4E4E4" stroke="#B0B0B0"/>
<circle cx="46" cy="163" r="5" fill="#8C8C8C"/>
<text x="128" y="168" text-anchor="start" font-size="10" fill="#333">N = 1</text>
<rect x="170" y="156" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
<circle cx="175" cy="164" r="2.3" fill="#4A4A4A"/>

<!-- C=10 slider -->
<rect x="20" y="183" width="150" height="34" rx="5" fill="#F0F0F0" stroke="#8C8C8C"/>
<rect x="28" y="194" width="60" height="10" rx="3" fill="#E4E4E4" stroke="#B0B0B0"/>
<circle cx="52" cy="199" r="5" fill="#8C8C8C"/>
<text x="128" y="204" text-anchor="start" font-size="10" fill="#333">C = 10</text>
<rect x="170" y="192" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
<circle cx="175" cy="200" r="2.3" fill="#4A4A4A"/>

<!-- wires into Series -->
<path d="M 180,128 C 220,128 220,128 262,128" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 180,164 C 220,164 220,164 262,164" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 180,200 C 220,200 220,200 262,200" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Series component: box x=270 y=90 w=150 h=140 (spans 90-230) -->
<g>
  <rect x="270" y="90" width="150" height="140" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="345" y="116" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Series</text>
  <line x1="285" y1="124" x2="405" y2="124" stroke="#B5B5B0" stroke-width="1"/>
  <!-- input nubs: S center=128, N center=164, C center=200 -->
  <rect x="262" y="120" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="267" cy="128" r="2.3" fill="#4A4A4A"/>
  <text x="278" y="132" font-size="11" fill="#333">S</text>
  <rect x="262" y="156" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="267" cy="164" r="2.3" fill="#4A4A4A"/>
  <text x="278" y="168" font-size="11" fill="#333">N</text>
  <rect x="262" y="192" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="267" cy="200" r="2.3" fill="#4A4A4A"/>
  <text x="278" y="204" font-size="11" fill="#333">C</text>
  <!-- output nub: center=160 (box vertical middle) -->
  <rect x="418" y="152" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="423" cy="160" r="2.3" fill="#4A4A4A"/>
  <text x="408" y="156" text-anchor="end" font-size="11" fill="#333">S</text>
</g>

<!-- wire to result panel -->
<path d="M 428,160 C 445,160 445,160 460,160" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- result Panel showing generated values -->
<rect x="462" y="140" width="46" height="40" fill="#FFFFFF" stroke="#8C8C8C" stroke-width="1"/>
<text x="468" y="154" font-size="9" fill="#222">0,1,2</text>
<text x="468" y="166" font-size="9" fill="#222">...,9</text>

<!-- Right side: Rhino-style viewport showing points spaced by series values -->
<rect x="520" y="0" width="380" height="440" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="520" y1="380" x2="900" y2="380"/>
  <line x1="520" y1="345" x2="900" y2="345"/>
  <line x1="520" y1="315" x2="900" y2="315"/>
</g>
<text x="530" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective</text>

<!-- baseline -->
<line x1="560" y1="280" x2="870" y2="280" stroke="#D0D0D0" stroke-width="1"/>
<!-- 8 evenly spaced points along X, representing Series 0..7 -->
<g fill="#c0392b">
  <circle cx="565" cy="280" r="3"/>
  <circle cx="605" cy="280" r="3"/>
  <circle cx="645" cy="280" r="3"/>
  <circle cx="685" cy="280" r="3"/>
  <circle cx="725" cy="280" r="3"/>
  <circle cx="765" cy="280" r="3"/>
  <circle cx="805" cy="280" r="3"/>
  <circle cx="845" cy="280" r="3"/>
</g>
<g font-size="9" fill="#666" text-anchor="middle">
  <text x="565" y="300">0</text>
  <text x="605" y="300">1</text>
  <text x="645" y="300">2</text>
  <text x="685" y="300">3</text>
  <text x="845" y="300">7</text>
</g>

<text x="530" y="410" font-size="11" fill="#555">Series sinh dãy số 0,1,2...9 — dùng làm toạ độ X để dựng dãy điểm cách đều</text>
</svg>
