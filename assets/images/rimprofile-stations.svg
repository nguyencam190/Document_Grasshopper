<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="420" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="16" y="26" font-size="13" font-weight="bold" fill="#222">Profile vành — dựng theo "trạm" (station-based), sau đó Mirror lấy nửa kia</text>

<!-- center axis -->
<line x1="120" y1="20" x2="120" y2="400" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
<text x="126" y="34" font-size="10" fill="#c0392b">trục tâm</text>

<!-- station points forming half profile -->
<circle cx="120" cy="360" r="4" fill="#222"/>
<text x="90" y="378" font-size="11" fill="#333">Bore</text>

<circle cx="180" cy="330" r="4" fill="#e8a33d"/>
<text x="188" y="322" font-size="11" fill="#8a5a1a">Center Width</text>

<circle cx="260" cy="220" r="4" fill="#5b8def"/>
<text x="268" y="212" font-size="11" fill="#2a4a8a">Middle Width</text>

<circle cx="300" cy="90" r="4" fill="#4a9a3f"/>
<text x="308" y="82" font-size="11" fill="#2a6a1f">Top Width</text>

<circle cx="340" cy="40" r="4" fill="#222"/>
<text x="290" y="30" font-size="11" fill="#333">Flange</text>

<!-- half profile curve through stations -->
<path d="M 120,360 Q 150,345 180,330 Q 220,280 260,220 Q 280,160 300,90 Q 320,60 340,40" fill="none" stroke="#333" stroke-width="1.6"/>

<!-- vectors between stations (Calculates Mid Vector concept) -->
<path d="M 180,330 L 260,220" stroke="#5b8def" stroke-width="1" stroke-dasharray="3,2"/>
<path d="M 260,220 L 300,90" stroke="#5b8def" stroke-width="1" stroke-dasharray="3,2"/>
<text x="195" y="270" font-size="9" fill="#2a4a8a">V1</text>
<text x="270" y="150" font-size="9" fill="#2a4a8a">V2</text>
<path d="M 240,235 A 20,20 0 0 1 270,205" fill="none" stroke="#c0392b" stroke-width="1.2"/>
<text x="272" y="230" font-size="9" fill="#c0392b">góc giữa V1,V2</text>
<text x="272" y="243" font-size="9" fill="#c0392b">→ Amplitude fillet</text>

<!-- mirror side (faint, mirrored across a vertical guide) -->
<line x1="460" y1="20" x2="460" y2="400" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
<text x="466" y="34" font-size="10" fill="#888">trục gương (Mirror)</text>
<g opacity="0.45">
<path d="M 460,360 Q 490,345 520,330 Q 560,280 600,220 Q 620,160 640,90 Q 660,60 680,40" fill="none" stroke="#333" stroke-width="1.6"/>
<path d="M 240,360 Q 270,345 300,330 Q 340,280 380,220 Q 400,160 420,90 Q 440,60 460,40" fill="none" stroke="#333" stroke-width="1.6" transform="translate(-120,0)"/>
</g>
<text x="470" y="370" font-size="10" fill="#888">Main Side</text>
<text x="600" y="370" font-size="10" fill="#888">Mirror Side (đối xứng)</text>

<!-- right side: assembled ring result -->
<rect x="700" y="60" width="180" height="280" fill="#FAFAFA" stroke="#B0B0B0"/>
<text x="710" y="76" font-family="Consolas, monospace" font-size="11" fill="#555">Kết quả (mặt cắt)</text>
<path d="M 730,300 L 760,270 L 800,180 L 830,120 L 850,90 L 850,110 L 835,135 L 810,195 L 775,280 L 745,310 Z" fill="#D8CDBE" stroke="#111" stroke-width="1.2"/>
<text x="710" y="330" font-size="9" fill="#555">Vành hoàn chỉnh sau Mirror</text>

<text x="16" y="405" font-size="11" fill="#555">Mỗi trạm chỉ cần 1 giá trị Width — đổi số là đổi hình dạng, không vẽ lại đường cong</text>
</svg>
