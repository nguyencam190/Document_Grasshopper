<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBodyE" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dotgridE" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>
<rect x="0" y="0" width="900" height="300" fill="url(#dotgridE)"/>
<rect x="0" y="0" width="900" height="300" fill="#F7F7F2" opacity="0.35"/>

<!-- Number slider N=10 -->
<g>
  <rect x="30" y="120" width="140" height="30" rx="5" fill="#F0F0F0" stroke="#8C8C8C"/>
  <rect x="38" y="130" width="60" height="10" rx="3" fill="#E4E4E4" stroke="#B0B0B0"/>
  <circle cx="70" cy="135" r="5" fill="#8C8C8C"/>
  <text x="136" y="140" text-anchor="start" font-size="10" fill="#333">N=10</text>
</g>
<rect x="170" y="128" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="175" cy="135" r="2.3" fill="#4A4A4A"/>

<path d="M 175,135 C 210,135 210,135 240,135" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Number param box with Expression set -->
<g>
  <rect x="242" y="105" width="180" height="70" rx="6" fill="url(#ghBodyE)" stroke="#8C8C8C" stroke-width="1.3"/>
  <text x="332" y="128" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Number</text>
  <rect x="256" y="138" width="152" height="24" rx="4" fill="#FFF9E0" stroke="#c99a2e"/>
  <text x="332" y="154" text-anchor="middle" font-family="Consolas, monospace" font-size="11" fill="#6b4e0a">x*2+1</text>
  <rect x="234" y="128" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="239" cy="135" r="2.3" fill="#4A4A4A"/>
  <rect x="418" y="128" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="423" cy="135" r="2.3" fill="#4A4A4A"/>
</g>
<text x="332" y="192" text-anchor="middle" font-size="10" fill="#888">Right-click → Expression → gõ "x*2+1"</text>

<path d="M 428,135 C 460,135 460,135 490,135" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Panel showing result -->
<rect x="492" y="120" width="80" height="30" fill="#FFFFFF" stroke="#8C8C8C" stroke-width="1"/>
<text x="532" y="140" text-anchor="middle" font-size="13" fill="#222">21</text>

<text x="30" y="250" font-size="12" fill="#555">Expression dùng "x" đại diện giá trị hiện có của param, tính ngay tại chỗ — không cần kéo riêng component Expression</text>
</svg>
