  <text x="229" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#222">Point (P1)</text>
  <rect x="166" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="170" cy="219" r="2" fill="#4A4A4A"/><text x="182" y="212" font-size="8" fill="#888">X</text>
  <rect x="282" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="286" cy="219" r="2" fill="#4A4A4A"/>
</g>
<g>
