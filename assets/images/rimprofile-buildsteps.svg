  <rect x="348" y="132" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="352" cy="139" r="2" fill="#4A4A4A"/><text x="364" y="132" font-size="8" fill="#888">B</text>
  <rect x="448" y="122" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="452" cy="129" r="2" fill="#4A4A4A"/>
