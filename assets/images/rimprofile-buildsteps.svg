<path d="M 870,219 C 900,219 900,220 930,220" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>
<path d="M 286,59 C 900,59 900,205 930,205" stroke="#4A4A4A" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.6"/>
<path d="M 286,379 C 900,379 900,235 930,235" stroke="#4A4A4A" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.6"/>

<!-- Interpolate -->
<g>
  <rect x="932" y="190" width="90" height="60" rx="6" fill="url(#ghB)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="977" y="224" text-anchor="middle" font-size="11" font-weight="600" fill="#222">Interpolate</text>
  <rect x="924" y="202" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="928" cy="209" r="2" fill="#4A4A4A"/><text x="940" y="202" font-size="8" fill="#888">V</text>
  <rect x="924" y="222" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="928" cy="229" r="2" fill="#4A4A4A"/><text x="940" y="222" font-size="8" fill="#888">V</text>
  <rect x="1018" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="1022" cy="219" r="2" fill="#4A4A4A"/>
</g>

<text x="60" y="440" font-size="12" fill="#555">3 Number Slider (Width) → Construct Point tại 3 trạm → Vector 2Pt (V1,V2) → Angle → Amplitude → Move → Interpolate → 1 nửa profile</text>
<text x="60" y="460" font-size="11" fill="#888">(Mirror nửa này qua trục Z để lấy profile hoàn chỉnh — không vẽ ở đây, xem bước 8 trong hướng dẫn)</text>
</svg>
