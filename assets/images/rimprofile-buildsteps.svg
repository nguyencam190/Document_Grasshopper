  <rect x="348" y="292" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="352" cy="299" r="2" fill="#4A4A4A"/><text x="364" y="292" font-size="8" fill="#888">B</text>
  <rect x="448" y="282" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="452" cy="289" r="2" fill="#4A4A4A"/>
</g>

<!-- wires to Angle -->
<path d="M 452,129 C 480,129 480,190 508,190" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>
<path d="M 452,289 C 480,289 480,210 508,210" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>

<!-- Angle: x=510 w=90 h=60 y=180 -->
<g>
  <rect x="510" y="180" width="90" height="60" rx="6" fill="url(#ghB)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="555" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#222">Angle</text>
  <rect x="502" y="192" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="506" cy="199" r="2" fill="#4A4A4A"/><text x="518" y="192" font-size="8" fill="#888">A</text>
  <rect x="502" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="506" cy="219" r="2" fill="#4A4A4A"/><text x="518" y="212" font-size="8" fill="#888">B</text>
  <rect x="596" y="202" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="600" cy="209" r="2" fill="#4A4A4A"/>
</g>

<path d="M 600,209 C 625,209 625,210 650,210" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>

<!-- Amplitude: x=652 w=90 h=60 y=180 -->
<g>
  <rect x="652" y="180" width="90" height="60" rx="6" fill="url(#ghB)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="697" y="207" text-anchor="middle" font-size="11" font-weight="600" fill="#222">Amplitude</text>
  <text x="697" y="221" text-anchor="middle" font-size="9" fill="#555">(bo góc)</text>
  <rect x="644" y="192" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="648" cy="199" r="2" fill="#4A4A4A"/><text x="660" y="192" font-size="8" fill="#888">V</text>
  <rect x="644" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="648" cy="219" r="2" fill="#4A4A4A"/><text x="660" y="212" font-size="8" fill="#888">A</text>
  <rect x="738" y="202" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="742" cy="209" r="2" fill="#4A4A4A"/>
</g>

<path d="M 742,209 C 765,209 765,220 788,220" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>
<path d="M 286,219 C 750,219 750,235 788,235" stroke="#4A4A4A" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.6"/>

<!-- Move: x=790 w=80 h=60 y=190 -->
<g>
  <rect x="790" y="190" width="80" height="60" rx="6" fill="url(#ghB)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="830" y="224" text-anchor="middle" font-size="12" font-weight="600" fill="#222">Move</text>
  <rect x="782" y="202" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="786" cy="209" r="2" fill="#4A4A4A"/><text x="798" y="202" font-size="8" fill="#888">G</text>
  <rect x="782" y="222" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="786" cy="229" r="2" fill="#4A4A4A"/><text x="798" y="222" font-size="8" fill="#888">T</text>
  <rect x="866" y="212" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="870" cy="219" r="2" fill="#4A4A4A"/>
