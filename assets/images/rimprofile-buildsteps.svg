<path d="M 126,203 C 150,203 150,220 172,220" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>
<path d="M 126,363 C 150,363 150,380 172,380" stroke="#4A4A4A" stroke-width="1.2" fill="none"/>

<!-- 3 Construct Point boxes: x=174 w=110 h=60, y=30/190/350 -->
<g>
