  <text x="65" y="47" text-anchor="middle">Center Width</text>
  <rect x="10" y="190" width="110" height="26" rx="4" fill="url(#ghB)" stroke="#8C8C8C"/>
  <text x="65" y="207" text-anchor="middle">Middle Width</text>
  <rect x="10" y="350" width="110" height="26" rx="4" fill="url(#ghB)" stroke="#8C8C8C"/>
  <text x="65" y="367" text-anchor="middle">Top Width</text>
</g>
<g>
  <rect x="122" y="36" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="126" cy="43" r="2" fill="#4A4A4A"/>
  <rect x="122" y="196" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="126" cy="203" r="2" fill="#4A4A4A"/>
  <rect x="122" y="356" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="126" cy="363" r="2" fill="#4A4A4A"/>
</g>

<!-- wires to Construct Point -->
