  <rect x="166" y="52" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="170" cy="59" r="2" fill="#4A4A4A"/><text x="182" y="52" font-size="8" fill="#888">X</text>
  <rect x="282" y="52" width="9" height="14" rx="2" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="286" cy="59" r="2" fill="#4A4A4A"/>
