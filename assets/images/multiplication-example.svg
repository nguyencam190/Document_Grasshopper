<!-- dimension markers -->
<line x1="60" y1="45" x2="530" y2="45" stroke="#c0392b" stroke-width="1"/>
<text x="295" y="40" text-anchor="middle" font-size="11" fill="#c0392b">6 cột</text>
<line x1="45" y1="60" x2="45" y2="290" stroke="#c0392b" stroke-width="1"/>
<text x="30" y="180" text-anchor="middle" font-size="11" fill="#c0392b" transform="rotate(-90 30 180)">4 hàng</text>

<text x="320" y="330" text-anchor="middle" font-size="13" fill="#222">Tổng số module = Cột × Hàng = 6 × 4 = 24</text>
<text x="320" y="350" text-anchor="middle" font-size="10.5" fill="#555">Multiplication dùng để tính trước số lượng module cần sinh trong pattern lưới</text>
</svg>
