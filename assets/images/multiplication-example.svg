<text x="14" y="26" font-family="Consolas, monospace" font-size="12" fill="#555">Top</text>

<g fill="#eef3ff" stroke="#3a5fcd" stroke-width="1.4">
<!-- generated rects -->
<rect x="60" y="60" width="70" height="50"/>
<rect x="140" y="60" width="70" height="50"/>
