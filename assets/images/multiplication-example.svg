<rect x="300" y="120" width="70" height="50"/>
<rect x="380" y="120" width="70" height="50"/>
<rect x="460" y="120" width="70" height="50"/>

<rect x="60" y="180" width="70" height="50"/>
<rect x="140" y="180" width="70" height="50"/>
<rect x="220" y="180" width="70" height="50"/>
<rect x="300" y="180" width="70" height="50"/>
<rect x="380" y="180" width="70" height="50"/>
<rect x="460" y="180" width="70" height="50"/>

