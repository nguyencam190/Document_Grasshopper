<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ptBody2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F200"/>
    <stop offset="100%" stop-color="#A8C400"/>
  </linearGradient>
  <linearGradient id="ghBody4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dotgrid4" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="900" height="260" fill="#FAFAF7"/>
<rect x="0" y="0" width="900" height="260" fill="url(#dotgrid4)"/>

<!-- Box 1: Point (Pt) param, box x=30 y=100 w=130 h=80 (spans 100-180) -->
<g>
  <rect x="30" y="100" width="130" height="80" rx="6" fill="url(#ptBody2)" stroke="#3d4a0a" stroke-width="1.4"/>
  <g transform="translate(95,140)">
    <polygon points="0,-14 12,-7 12,7 0,14 -12,7 -12,-7" fill="#1a1a1a"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fff" stroke-width="2.4"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fff" stroke-width="2.4"/>
  </g>
  <rect x="152" y="132" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#3d4a0a"/>
  <circle cx="157" cy="140" r="2.5" fill="#3d4a0a"/>
</g>
<text x="95" y="200" text-anchor="middle" font-size="10" fill="#888">4 điểm tham chiếu</text>

<!-- wire 1 -->
<path d="M 162,140 C 195,140 195,140 228,140" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 2: Interpolate (box x=230 y=100 w=140 h=80, spans 100-180) -->
<g>
  <rect x="230" y="100" width="140" height="80" rx="6" fill="url(#ghBody4)" stroke="#8C8C8C" stroke-width="1.3"/>
  <text x="300" y="144" text-anchor="middle" font-size="13" font-weight="600" fill="#222">Interpolate</text>
  <rect x="222" y="132" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="227" cy="140" r="2.5" fill="#4A4A4A"/>
  <text x="214" y="144" text-anchor="end" font-size="10" fill="#888">V</text>
  <rect x="368" y="132" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="373" cy="140" r="2.5" fill="#4A4A4A"/>
</g>

<!-- wire 2 -->
<path d="M 378,140 C 405,140 405,140 432,140" stroke="#4A4A4A" stroke-width="1.5" fill="none"/>

<!-- Box 3: Curve output param -->
<g>
  <rect x="434" y="116" width="100" height="48" rx="6" fill="url(#ghBody4)" stroke="#8C8C8C" stroke-width="1"/>
  <text x="484" y="144" text-anchor="middle" font-size="13" fill="#222">Curve</text>
  <rect x="530" y="132" width="10" height="16" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="535" cy="140" r="2.5" fill="#4A4A4A"/>
</g>

<!-- wire to viewport -->
<path d="M 540,140 C 570,140 570,140 596,140" stroke="#4A4A4A" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>

<!-- Mini Rhino viewport result -->
<g>
  <rect x="598" y="40" width="264" height="180" fill="#FFFFFF" stroke="#B0B0B0"/>
  <g stroke="#D8D8D8" stroke-width="1">
    <line x1="598" y1="190" x2="862" y2="190"/>
    <line x1="598" y1="170" x2="862" y2="170"/>
  </g>
  <text x="606" y="56" font-family="Consolas, monospace" font-size="10" fill="#555">Perspective</text>
  <path d="M 620,190 C 660,90 780,90 840,150" stroke="#111" stroke-width="1.4" fill="none"/>
  <g fill="#c0392b">
    <circle cx="620" cy="190" r="3"/>
    <circle cx="700" cy="110" r="3"/>
    <circle cx="780" cy="105" r="3"/>
    <circle cx="840" cy="150" r="3"/>
  </g>
</g>

<text x="20" y="245" font-size="12" fill="#555">Workflow phổ biến: Point (Pt) → Interpolate → 1 đường cong đi qua các điểm tham chiếu</text>
</svg>
