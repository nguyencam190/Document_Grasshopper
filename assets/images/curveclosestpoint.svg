<svg width="900" height="380" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <linearGradient id="paramGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F200"/>
    <stop offset="100%" stop-color="#A8C400"/>
  </linearGradient>
  <pattern id="dotgrid" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="520" height="380" fill="url(#dotgrid)"/>
<rect x="0" y="0" width="520" height="380" fill="#F7F7F2" opacity="0.35"/>

<!-- Point param -->
<rect x="20" y="40" width="130" height="34" rx="5" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="85" y="61" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3d00">Point</text>
<rect x="148" y="50" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="153" cy="57" r="2.3" fill="#3a3d00"/>

<!-- Curve param -->
<rect x="20" y="104" width="130" height="34" rx="5" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="85" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#3a3d00">Curve</text>
<rect x="148" y="114" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="153" cy="121" r="2.3" fill="#3a3d00"/>

<!-- wires into component -->
<path d="M 153,57 C 185,57 185,104 212,104" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 153,121 C 185,121 185,138 212,138" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Curve Closest Point box: x=220 y=40 w=175 h=130 (range 40-170) -->
<g>
  <rect x="220" y="40" width="175" height="130" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="307" y="60" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#222">Curve Closest</text>
  <text x="307" y="76" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#222">Point</text>
  <line x1="234" y1="86" x2="380" y2="86" stroke="#B5B5B0" stroke-width="1"/>
  <!-- input P center=104 -->
  <rect x="212" y="97" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="217" cy="104" r="2.3" fill="#4A4A4A"/>
  <text x="230" y="108" font-size="11" fill="#333">P</text>
  <!-- input C center=138 -->
  <rect x="212" y="131" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="217" cy="138" r="2.3" fill="#4A4A4A"/>
  <text x="230" y="142" font-size="11" fill="#333">C</text>
  <!-- output P center=95 -->
  <rect x="403" y="88" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="408" cy="95" r="2.3" fill="#4A4A4A"/>
  <text x="393" y="99" text-anchor="end" font-size="11" fill="#333">P</text>
  <!-- output t center=119 -->
  <rect x="403" y="112" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="408" cy="119" r="2.3" fill="#4A4A4A"/>
  <text x="393" y="123" text-anchor="end" font-size="11" fill="#333">t</text>
  <!-- output D center=143 -->
  <rect x="403" y="136" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="408" cy="143" r="2.3" fill="#4A4A4A"/>
  <text x="393" y="147" text-anchor="end" font-size="11" fill="#333">D</text>
</g>

<!-- wires to result panel -->
<path d="M 408,95 C 425,95 425,95 440,95" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 408,119 C 425,119 425,119 440,119" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 408,143 C 425,143 425,143 440,143" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<rect x="442" y="80" width="70" height="72" fill="#FFFFFF" stroke="#8C8C8C" stroke-width="1"/>
<text x="448" y="98" font-size="9" fill="#222">P: {x,y,z}</text>
<text x="448" y="122" font-size="9" fill="#222">t: 0.62</text>
<text x="448" y="146" font-size="9" fill="#222">D: 8.4</text>

<!-- Right side: Rhino viewport -->
<rect x="520" y="0" width="380" height="380" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="520" y1="340" x2="900" y2="340"/>
  <line x1="520" y1="310" x2="900" y2="310"/>
  <line x1="520" y1="285" x2="900" y2="285"/>
</g>
<text x="530" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective</text>

<path d="M 560,300 Q 680,140 860,110" stroke="#222222" stroke-width="2.2" fill="none"/>
<circle cx="742" cy="121" r="4.5" fill="#c0392b"/>
<circle cx="770" cy="200" r="3.5" fill="#c0392b" opacity="0.55"/>
<line x1="770" y1="200" x2="742" y2="121" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,2"/>
<text x="778" y="200" font-size="10" fill="#c0392b">Point input (P)</text>
<text x="700" y="105" text-anchor="end" font-size="10" fill="#c0392b">Điểm gần nhất</text>
<text x="700" y="93" text-anchor="end" font-size="10" fill="#c0392b">trên Curve (output P)</text>

<text x="530" y="358" font-size="10.5" fill="#555">Curve Closest Point "chiếu" Point xuống vị trí gần</text>
<text x="530" y="372" font-size="10.5" fill="#555">nhất trên Curve, trả về P, t (parameter), D (khoảng cách)</text>
</svg>
