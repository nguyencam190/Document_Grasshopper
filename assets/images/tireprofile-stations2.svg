<path d="M 877,190 C 895,190 895,190 920,190" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<text x="20" y="380" font-size="12" fill="#333">Height = Tire Width × (Ratio ÷ 100) — dùng cho X,Y của cả 5 điểm</text>
