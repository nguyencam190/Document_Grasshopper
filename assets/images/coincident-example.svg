<svg width="640" height="380" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="640" height="380" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="0" y1="330" x2="640" y2="330"/>
  <line x1="0" y1="300" x2="640" y2="300"/>
  <line x1="0" y1="275" x2="640" y2="275"/>
</g>
<text x="12" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective — mái căng dây (cable-net)</text>

<!-- two separate cable curve groups meeting at a shared ring point -->
<g stroke="#111" stroke-width="1.2" fill="none">
  <path d="M 100,280 C 180,150 260,140 320,190"/>
  <path d="M 540,280 C 460,150 380,140 320,190"/>
  <path d="M 200,300 C 250,220 290,200 320,190"/>
  <path d="M 440,300 C 390,220 350,200 320,190"/>
</g>

<!-- shared coincident point (ring/hub where cables merge) -->
<circle cx="320" cy="190" r="7" fill="#c0392b"/>
<circle cx="320" cy="190" r="12" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="2,2"/>

<text x="330" y="185" font-size="10" fill="#c0392b">4 đầu dây → Coincident</text>

<text x="12" y="358" font-size="12" fill="#555">Coincident ép 4 đầu dây cáp (thuộc 2 nhóm mesh riêng) trùng về 1 điểm hub — dựng mái căng dây</text>
</svg>
