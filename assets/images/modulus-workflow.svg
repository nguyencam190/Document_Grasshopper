<svg width="1180" height="360" viewBox="0 0 1180 360" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <pattern id="dg" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>
<rect x="0" y="0" width="800" height="360" fill="#FAFAF7"/>
<rect x="0" y="0" width="800" height="360" fill="url(#dg)"/>

<!-- Series box x=20 y=90 w=120 h=110 -->
<g>
  <rect x="20" y="90" width="120" height="110" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="80" y="112" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#222">Series</text>
  <rect x="12" y="108" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="17" cy="115" r="2.3" fill="#4A4A4A"/>
  <text x="28" y="119" font-size="9.5" fill="#333">S=0</text>
  <rect x="12" y="138" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="17" cy="145" r="2.3" fill="#4A4A4A"/>
  <text x="28" y="149" font-size="9.5" fill="#333">N=1</text>
  <rect x="12" y="168" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="17" cy="175" r="2.3" fill="#4A4A4A"/>
  <text x="28" y="179" font-size="9.5" fill="#333">C=10</text>
  <rect x="128" y="138" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="133" cy="145" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 133,145 C 155,145 155,145 172,145" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<!-- Modulus box -->
<g>
  <rect x="180" y="110" width="120" height="80" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="240" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Modulus</text>
  <rect x="172" y="133" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="177" cy="140" r="2.3" fill="#4A4A4A"/>
  <text x="189" y="144" font-size="10" fill="#333">A</text>
  <rect x="172" y="157" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="177" cy="164" r="2.3" fill="#4A4A4A"/>
  <text x="189" y="168" font-size="10" fill="#333">B=2</text>
  <rect x="298" y="145" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="303" cy="152" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 303,152 C 325,152 325,152 342,152" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<!-- Equality box -->
<g>
  <rect x="350" y="115" width="120" height="75" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="410" y="137" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Equality</text>
  <rect x="342" y="138" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="347" cy="145" r="2.3" fill="#4A4A4A"/>
  <text x="359" y="149" font-size="10" fill="#333">A</text>
  <rect x="342" y="160" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="347" cy="167" r="2.3" fill="#4A4A4A"/>
  <text x="359" y="171" font-size="10" fill="#333">B=0</text>
  <rect x="468" y="149" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="473" cy="156" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 473,156 C 495,156 495,180 512,180" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<path d="M 133,145 C 550,145 550,165 512,165" stroke="#4A4A4A" stroke-width="1" fill="none" stroke-dasharray="2,2" opacity="0.6"/>

<!-- Cull Pattern box -->
<g>
  <rect x="520" y="140" width="130" height="80" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="585" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Cull Pattern</text>
  <rect x="512" y="158" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="517" cy="165" r="2.3" fill="#4A4A4A"/>
  <text x="529" y="169" font-size="10" fill="#333">L</text>
  <rect x="512" y="180" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="517" cy="187" r="2.3" fill="#4A4A4A"/>
  <text x="529" y="191" font-size="10" fill="#333">P</text>
  <rect x="648" y="173" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="653" cy="180" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 653,180 C 680,180 680,180 700,180" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<text x="20" y="260" font-size="12" fill="#333">Series (0..9) → Modulus (B=2) → Equality (=0) → Cull Pattern → lọc chỉ số chẵn</text>
<text x="20" y="282" font-size="11" fill="#555">P (Pattern) của Cull Pattern nhận list True/False từ Equality — True thì GIỮ, False thì loại bỏ.</text>

<!-- Right viewport -->
<rect x="800" y="0" width="380" height="360" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="810" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Top</text>
<g>
<circle cx="840" cy="180" r="6" fill="#c0392b"/><text x="840" y="200" text-anchor="middle" font-size="9" fill="#999">0</text>
<circle cx="880" cy="180" r="4" fill="#cccccc"/><text x="880" y="200" text-anchor="middle" font-size="9" fill="#999">1</text>
<circle cx="920" cy="180" r="6" fill="#c0392b"/><text x="920" y="200" text-anchor="middle" font-size="9" fill="#999">2</text>
<circle cx="960" cy="180" r="4" fill="#cccccc"/><text x="960" y="200" text-anchor="middle" font-size="9" fill="#999">3</text>
<circle cx="1000" cy="180" r="6" fill="#c0392b"/><text x="1000" y="200" text-anchor="middle" font-size="9" fill="#999">4</text>
<circle cx="1040" cy="180" r="4" fill="#cccccc"/><text x="1040" y="200" text-anchor="middle" font-size="9" fill="#999">5</text>
</g>
<text x="810" y="240" font-size="10.5" fill="#c0392b">● Đỏ: giữ lại (chỉ số chẵn, R=0)</text>
<text x="810" y="256" font-size="10.5" fill="#999">● Xám: bị Cull Pattern loại bỏ</text>
</svg>
