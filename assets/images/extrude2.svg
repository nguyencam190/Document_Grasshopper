<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFC97A"/>
    <stop offset="100%" stop-color="#F0900E"/>
  </linearGradient>
  <pattern id="dotgrid2" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>

<rect x="0" y="0" width="520" height="420" fill="url(#dotgrid2)"/>
<rect x="0" y="0" width="520" height="420" fill="#F7F7F2" opacity="0.35"/>

<!-- Base geometry param -->
<g>
  <rect x="18" y="70" width="120" height="46" rx="6" fill="#F0F0F0" stroke="#8C8C8C"/>
  <text x="78" y="98" text-anchor="middle" font-size="13" fill="#222">Base (B)</text>
  <rect x="136" y="86" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="141" cy="93" r="2.3" fill="#4A4A4A"/>
</g>

<!-- Direction vector param -->
<g>
  <rect x="18" y="150" width="120" height="46" rx="6" fill="#F0F0F0" stroke="#8C8C8C"/>
  <text x="78" y="178" text-anchor="middle" font-size="13" fill="#222">Direction (D)</text>
  <rect x="136" y="166" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/>
  <circle cx="141" cy="173" r="2.3" fill="#4A4A4A"/>
</g>

<!-- Extrude component (orange, matches real GH Surface-tab color) -->
<g>
  <rect x="230" y="90" width="150" height="110" rx="6" fill="url(#ghBody2)" stroke="#8A4B06" stroke-width="1.3"/>
  <text x="305" y="150" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a2200">Extrude</text>
  <!-- input nubs (both on the box's left edge, y=90..200) -->
  <rect x="222" y="110" width="10" height="16" rx="3" fill="#3a2200" stroke="#3a2200"/>
  <text x="238" y="122" font-size="12" fill="#3a2200">B</text>
  <rect x="222" y="166" width="10" height="16" rx="3" fill="#3a2200" stroke="#3a2200"/>
  <text x="238" y="178" font-size="12" fill="#3a2200">D</text>
  <!-- output nub -->
  <rect x="378" y="137" width="10" height="16" rx="3" fill="#3a2200" stroke="#3a2200"/>
  <text x="368" y="141" text-anchor="end" font-size="12" fill="#3a2200">E</text>
</g>

<!-- wires -->
<path d="M 141,93 C 180,93 180,118 227,118" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 141,173 C 180,173 180,174 227,174" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>
<path d="M 388,145 C 430,145 430,145 470,145" stroke="#4A4A4A" stroke-width="1.4" fill="none"/>

<!-- Right: Rhino viewport showing extrusion result -->
<rect x="520" y="0" width="380" height="420" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="520" y1="360" x2="900" y2="360"/>
  <line x1="520" y1="325" x2="900" y2="325"/>
  <line x1="520" y1="295" x2="900" y2="295"/>
</g>
<text x="530" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective</text>

<!-- base profile (pentagon) at bottom -->
<polygon points="640,330 760,330 790,300 700,260 610,300" fill="none" stroke="#111" stroke-width="1.3"/>
<!-- top profile (extruded copy) -->
<polygon points="655,180 775,180 805,150 715,110 625,150" fill="#EBCB8E" opacity="0.9" stroke="#111" stroke-width="1.3"/>
<!-- vertical edges connecting base to top -->
<line x1="640" y1="330" x2="655" y2="180" stroke="#111" stroke-width="1"/>
<line x1="760" y1="330" x2="775" y2="180" stroke="#111" stroke-width="1"/>
<line x1="790" y1="300" x2="805" y2="150" stroke="#111" stroke-width="1"/>
<line x1="700" y1="260" x2="715" y2="110" stroke="#111" stroke-width="1"/>
<line x1="610" y1="300" x2="625" y2="150" stroke="#111" stroke-width="1"/>
<!-- direction arrow -->
<line x1="700" y1="260" x2="715" y2="115" stroke="#c0392b" stroke-width="1.6" marker-end="url(#arrowhead)"/>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#c0392b"/>
  </marker>
</defs>
<text x="722" y="150" font-size="11" fill="#c0392b">Direction</text>

<text x="530" y="390" font-size="11" fill="#555">Mặt phẳng (Base) được đùn theo vector Direction (đỏ), tạo khối Extrusion mới</text>
</svg>
