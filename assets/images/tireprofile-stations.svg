<svg width="1060" height="480" viewBox="0 0 1060 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<defs>
  <linearGradient id="ghBody" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0F0F0"/>
    <stop offset="100%" stop-color="#D8D8D8"/>
  </linearGradient>
  <linearGradient id="paramGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F200"/>
    <stop offset="100%" stop-color="#A8C400"/>
  </linearGradient>
  <pattern id="dg" width="18" height="18" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#E0E0DA"/>
  </pattern>
</defs>
<rect x="0" y="0" width="680" height="480" fill="#FAFAF7"/>
<rect x="0" y="0" width="680" height="480" fill="url(#dg)"/>

<!-- 5 Construct Point boxes stacked -->
<g font-size="10.5" font-weight="600" fill="#222">
<rect x="20" y="20" width="130" height="50" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
<text x="85" y="41" text-anchor="middle">Construct Point</text>
<text x="85" y="55" text-anchor="middle" font-weight="400" fill="#555">(P0 — đỉnh mui)</text>
<rect x="148" y="38" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="153" cy="45" r="2.3" fill="#4A4A4A"/>

<rect x="20" y="85" width="130" height="50" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
<text x="85" y="106" text-anchor="middle">Construct Point</text>
<text x="85" y="120" text-anchor="middle" font-weight="400" fill="#555">(P1 — mép mui)</text>
<rect x="148" y="103" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="153" cy="110" r="2.3" fill="#4A4A4A"/>

<rect x="20" y="150" width="130" height="50" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
<text x="85" y="171" text-anchor="middle">Construct Point</text>
<text x="85" y="185" text-anchor="middle" font-weight="400" fill="#555">(P2 — vai lốp)</text>
<rect x="148" y="168" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="153" cy="175" r="2.3" fill="#4A4A4A"/>

<rect x="20" y="215" width="130" height="50" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
<text x="85" y="236" text-anchor="middle">Construct Point</text>
<text x="85" y="250" text-anchor="middle" font-weight="400" fill="#555">(P3 — bậc thang)</text>
<rect x="148" y="233" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="153" cy="240" r="2.3" fill="#4A4A4A"/>

<rect x="20" y="280" width="130" height="50" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
<text x="85" y="301" text-anchor="middle">Construct Point</text>
<text x="85" y="315" text-anchor="middle" font-weight="400" fill="#555">(P4 — đáy)</text>
<rect x="148" y="298" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="153" cy="305" r="2.3" fill="#4A4A4A"/>
</g>

<!-- 5 wires converging into Interpolate's single V input -->
<g stroke="#4A4A4A" stroke-width="1.3" fill="none">
<path d="M 153,45 C 195,45 195,185 242,185"/>
<path d="M 153,110 C 195,110 195,185 242,185"/>
<path d="M 153,175 C 195,175 195,185 242,185"/>
<path d="M 153,240 C 195,240 195,185 242,185"/>
<path d="M 153,305 C 195,305 195,185 242,185"/>
</g>

<!-- Interpolate box x=250 y=150 w=110 h=70 -->
<g>
  <rect x="250" y="150" width="110" height="70" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="305" y="190" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#222">Interpolate</text>
  <rect x="242" y="178" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="247" cy="185" r="2.3" fill="#4A4A4A"/>
  <text x="259" y="172" font-size="10" fill="#333">V</text>
  <rect x="350" y="178" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="355" cy="185" r="2.3" fill="#4A4A4A"/>
</g>

<!-- YZ Plane param -->
<rect x="250" y="250" width="120" height="34" rx="5" fill="url(#paramGrad)" stroke="#8C9400" stroke-width="1"/>
<text x="310" y="271" text-anchor="middle" font-size="11" font-weight="600" fill="#3a3d00">Plane (YZ, gốc)</text>
<rect x="368" y="260" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C9400"/><circle cx="373" cy="267" r="2.3" fill="#3a3d00"/>

<!-- Mirror box x=380 y=145 w=110 h=90 -->
<path d="M 355,185 C 365,185 365,168 372,168" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<path d="M 373,267 C 373,240 373,220 372,205" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<g>
  <rect x="380" y="145" width="110" height="90" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="435" y="195" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#222">Mirror</text>
  <rect x="372" y="161" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="377" cy="168" r="2.3" fill="#4A4A4A"/>
  <text x="389" y="165" font-size="10" fill="#333">G</text>
  <rect x="372" y="198" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="377" cy="205" r="2.3" fill="#4A4A4A"/>
  <text x="389" y="212" font-size="10" fill="#333">P</text>
  <rect x="488" y="178" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="493" cy="185" r="2.3" fill="#4A4A4A"/>
</g>

<!-- Wall Thickness slider -->
<rect x="380" y="260" width="120" height="34" rx="5" fill="#F0F0F0" stroke="#8C8C8C"/>
<rect x="388" y="271" width="60" height="10" rx="3" fill="#E4E4E4" stroke="#B0B0B0"/>
<circle cx="410" cy="276" r="5" fill="#8C8C8C"/>
<text x="492" y="281" text-anchor="end" font-size="10" fill="#333">Wall = 5</text>
<rect x="492" y="270" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="497" cy="277" r="2.3" fill="#4A4A4A"/>

<!-- Offset Curve box x=520 y=150 w=130 h=80 -->
<path d="M 493,185 C 505,185 505,175 512,175" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<path d="M 497,277 C 505,270 505,215 512,205" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>
<g>
  <rect x="520" y="150" width="130" height="80" rx="6" fill="url(#ghBody)" stroke="#8C8C8C" stroke-width="1.2"/>
  <text x="585" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Offset Curve</text>
  <rect x="512" y="168" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="517" cy="175" r="2.3" fill="#4A4A4A"/>
  <text x="529" y="179" font-size="10" fill="#333">C</text>
  <rect x="512" y="198" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="517" cy="205" r="2.3" fill="#4A4A4A"/>
  <text x="529" y="209" font-size="10" fill="#333">D</text>
  <rect x="642" y="183" width="10" height="14" rx="3" fill="#E8E8E8" stroke="#8C8C8C"/><circle cx="647" cy="190" r="2.3" fill="#4A4A4A"/>
</g>

<path d="M 647,190 C 665,190 665,190 680,190" stroke="#4A4A4A" stroke-width="1.3" fill="none"/>

<text x="20" y="380" font-size="12" fill="#333">Height = Tire Width × (Ratio ÷ 100) — dùng cho X,Y của cả 5 điểm</text>
<text x="20" y="400" font-size="11" fill="#555">5 điểm P0..P4 tính theo tỉ lệ bảng ở trên, Interpolate nối lại thành nửa profile</text>
<text x="20" y="418" font-size="11" fill="#555">Mirror lấy nửa còn lại, Offset Curve tạo viền đôi (độ dày thành lốp)</text>

<!-- Right side: Rhino viewport showing resulting silhouette -->
<rect x="680" y="0" width="380" height="480" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="690" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Front</text>

<path d="M 775.0,225.0 C 772.8,221.7 765.3,218.3 762.0,205.0 C 758.7,191.7 747.0,162.0 755.0,145.0 C 763.0,128.0 790.8,110.5 810.0,103.0 C 829.2,95.5 860.0,100.5 870.0,100.0 C 880.0,100.5 910.8,95.5 930.0,103.0 C 949.2,110.5 977.0,128.0 985.0,145.0 C 993.0,162.0 981.3,191.7 978.0,205.0 C 974.7,218.3 967.2,221.7 965.0,225.0" fill="none" stroke="#222222" stroke-width="2.2"/>

<path d="M 782.6,225.4 C 780.6,222.4 773.7,219.3 770.6,207.0 C 767.6,194.8 756.8,167.5 764.2,151.8 C 771.6,136.2 797.2,120.1 814.8,113.2 C 832.4,106.3 860.8,110.9 870.0,110.4 C 879.2,110.9 907.6,106.3 925.2,113.2 C 942.8,120.1 968.4,136.2 975.8,151.8 C 983.2,167.5 972.4,194.8 969.4,207.0 C 966.3,219.3 959.4,222.4 957.4,225.4" fill="none" stroke="#1f8a8a" stroke-width="1.6"/>

<line x1="700" y1="225" x2="1040" y2="225" stroke="#D0D0D0" stroke-width="1"/>
<text x="690" y="250" font-size="10.5" fill="#222">Đường đen: profile gốc (sau Mirror)</text>
<text x="690" y="266" font-size="10.5" fill="#1f8a8a">Đường xanh ngọc: Offset Curve (viền trong)</text>
<text x="690" y="440" font-size="10" fill="#999">Xấp xỉ hình dáng quan sát được từ video —</text>
<text x="690" y="454" font-size="10" fill="#999">không phải số đo chính xác 100% từ bản gốc.</text>
</svg>
