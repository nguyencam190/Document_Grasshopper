<svg width="640" height="380" viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="640" height="380" fill="#FFFFFF" stroke="#B0B0B0"/>
<g stroke="#D8D8D8" stroke-width="1">
  <line x1="0" y1="330" x2="640" y2="330"/>
  <line x1="0" y1="300" x2="640" y2="300"/>
  <line x1="0" y1="275" x2="640" y2="275"/>
</g>
<text x="12" y="24" font-family="Consolas, monospace" font-size="12" fill="#555">Perspective — mặt bằng site khảo sát</text>

<!-- site boundary polyline -->
<polygon points="120,300 480,290 520,180 250,120 100,190" fill="none" stroke="#111" stroke-width="1.3"/>

<!-- reference points = surveyed column locations -->
<g fill="#c0392b">
  <circle cx="180" cy="260" r="4"/>
  <circle cx="320" cy="250" r="4"/>
  <circle cx="420" cy="230" r="4"/>
  <circle cx="300" cy="180" r="4"/>
  <circle cx="200" cy="200" r="4"/>
</g>

<!-- small columns rising from each point -->
<g stroke="#111" stroke-width="1.1" fill="#D8CDBE">
  <rect x="176" y="220" width="8" height="40"/>
  <rect x="316" y="212" width="8" height="38"/>
  <rect x="416" y="194" width="8" height="36"/>
  <rect x="296" y="146" width="8" height="34"/>
  <rect x="196" y="164" width="8" height="36"/>
</g>

<text x="12" y="358" font-size="12" fill="#555">Point (Pt) tham chiếu 5 vị trí cột đã khảo sát trong Rhino → dựng cột tự động tại từng điểm</text>
</svg>
