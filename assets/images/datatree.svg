<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="420" fill="#FAFAF7"/>
<text x="16" y="26" font-size="14" font-weight="bold" fill="#222">Data Tree gốc: 2 nhánh, mỗi nhánh 3 item</text>

<!-- source tree -->
<g font-family="Consolas, monospace" font-size="12">
  <rect x="20" y="40" width="120" height="26" rx="4" fill="#F0F0F0" stroke="#8C8C8C"/>
  <text x="30" y="58" fill="#222">{0}: A, B, C</text>
  <rect x="20" y="72" width="120" height="26" rx="4" fill="#F0F0F0" stroke="#8C8C8C"/>
  <text x="30" y="90" fill="#222">{1}: D, E, F</text>
</g>

<line x1="150" y1="65" x2="220" y2="65" stroke="#999" stroke-width="1.2" marker-end="url(#arrH)"/>
<defs><marker id="arrH" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#999"/></marker></defs>

<!-- 3 result columns -->
<g>
  <rect x="230" y="20" width="200" height="120" rx="6" fill="#FFF" stroke="#8ecb3f" stroke-width="1.5"/>
  <text x="330" y="40" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a7a1a">Flatten</text>
  <rect x="245" y="55" width="170" height="26" rx="4" fill="#EAF6D8" stroke="#8ecb3f" font-family="Consolas"/>
  <text x="255" y="73" font-family="Consolas, monospace" font-size="11" fill="#222">{0}: A,B,C,D,E,F</text>
  <text x="330" y="105" text-anchor="middle" font-size="10" fill="#555">Gộp hết về 1 nhánh duy nhất</text>
  <text x="330" y="122" text-anchor="middle" font-size="10" fill="#555">— mất hoàn toàn cấu trúc cây</text>
</g>

<g>
  <rect x="230" y="150" width="200" height="140" rx="6" fill="#FFF" stroke="#e8a33d" stroke-width="1.5"/>
  <text x="330" y="170" text-anchor="middle" font-size="13" font-weight="bold" fill="#8a5a1a">Graft</text>
  <g font-family="Consolas, monospace" font-size="10">
    <rect x="245" y="182" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="250" y="196" fill="#222">{0;0}:A</text>
    <rect x="330" y="182" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="335" y="196" fill="#222">{0;1}:B</text>
    <rect x="245" y="206" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="250" y="220" fill="#222">{0;2}:C</text>
    <rect x="330" y="206" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="335" y="220" fill="#222">{1;0}:D</text>
    <rect x="245" y="230" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="250" y="244" fill="#222">{1;1}:E</text>
    <rect x="330" y="230" width="80" height="20" rx="3" fill="#FBEDD8" stroke="#e8a33d"/><text x="335" y="244" fill="#222">{1;2}:F</text>
  </g>
  <text x="330" y="265" text-anchor="middle" font-size="10" fill="#555">Mỗi item ra 1 nhánh riêng</text>
  <text x="330" y="280" text-anchor="middle" font-size="10" fill="#555">— xử lý độc lập từng phần tử</text>
</g>

<g>
  <rect x="230" y="300" width="200" height="100" rx="6" fill="#FFF" stroke="#5b8def" stroke-width="1.5"/>
  <text x="330" y="320" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a4a8a">Simplify</text>
  <rect x="245" y="332" width="170" height="26" rx="4" fill="#E3EBFB" stroke="#5b8def"/>
  <text x="255" y="350" font-family="Consolas, monospace" font-size="11" fill="#222">{0}:A,B,C {1}:D,E,F</text>
  <text x="330" y="378" text-anchor="middle" font-size="10" fill="#555">Bỏ lớp path thừa, KHÔNG gộp/tách item</text>
</g>

<!-- right side: practical grid pitfall -->
<rect x="460" y="20" width="420" height="380" fill="#FFFFFF" stroke="#B0B0B0"/>
<text x="472" y="40" font-size="13" font-weight="bold" fill="#222">Lỗi thường gặp: lưới điểm X×Y</text>

<text x="472" y="66" font-size="11" fill="#555">Không Graft trước khi nhân X×Y (list matching sai):</text>
<g fill="#c0392b">
  <circle cx="490" cy="100" r="4"/><circle cx="540" cy="130" r="4"/><circle cx="590" cy="160" r="4"/>
</g>
<text x="472" y="185" font-size="10" fill="#888">Chỉ ra 3 điểm theo đường chéo (bị "zip" theo index)</text>

<text x="472" y="220" font-size="11" fill="#555">Graft 1 danh sách trước khi nhân → đủ tổ hợp N×M:</text>
<g fill="#c0392b">
<circle cx="490" cy="250" r="4"/>
<circle cx="535" cy="250" r="4"/>
<circle cx="580" cy="250" r="4"/>
<circle cx="490" cy="285" r="4"/>
<circle cx="535" cy="285" r="4"/>
<circle cx="580" cy="285" r="4"/>
<circle cx="490" cy="320" r="4"/>
<circle cx="535" cy="320" r="4"/>
<circle cx="580" cy="320" r="4"/>
</g>
<text x="472" y="365" font-size="10" fill="#888">Đủ 9 điểm lưới 3×3 — đúng ý muốn dựng pattern</text>
</svg>
